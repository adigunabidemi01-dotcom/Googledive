<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background:#000;
            color:#00ff41;
            font-family:'VT323', monospace;
            overflow:hidden;
            height:100vh;
        }
        
        /* LOGIN SCREEN */
        #loginScreen {
            position:fixed;
            inset:0;
            background:radial-gradient(circle at center, #001a00, #000);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            z-index:9999;
            gap:40px;
        }
        
        .logo-container {
            text-align:center;
        }
        
        .logo-img {
            height:280px;
            filter:drop-shadow(0 0 70px #0f0) drop-shadow(0 0 30px #f0f);
        }
        
        .logo-text {
            font-size:62px;
            letter-spacing:8px;
            background:linear-gradient(90deg, #00ff41, #ff00ff, #00ffff);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            text-shadow:0 0 40px #0f0;
            margin-top:15px;
        }
        
        .hash-prompt {
            font-size:32px;
            color:#ff00ff;
            text-shadow:0 0 15px #f0f;
            margin-bottom:10px;
        }
        
        #hashInput {
            background:#0a0a0a;
            border:4px solid #ff00ff;
            color:#00ff41;
            font-family:'VT323', monospace;
            font-size:38px;
            padding:18px 40px;
            width:580px;
            text-align:center;
            box-shadow:0 0 40px #f0f;
        }
        
        #hashInput:focus {
            outline:none;
            border-color:#00ff41;
            box-shadow:0 0 55px #0f0;
        }
        
        .error-msg {
            color:#ff0000;
            font-size:26px;
            margin-top:30px;
            min-height:32px;
            animation:glitch 400ms infinite;
        }
        
        @keyframes glitch {
            0%,100% { opacity:1; }
            50% { opacity:0.4; }
        }
        
        /* MAIN INTERFACE */
        #mainInterface {
            display:none;
            height:100vh;
            flex-direction:column;
        }
        
        .header {
            background:linear-gradient(#1a1a1a, #000);
            border-bottom:4px solid #ff0000;
            padding:10px 25px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            height:78px;
        }
        
        .logo-header {
            display:flex;
            align-items:center;
            gap:15px;
        }
        
        .logo-header img {
            height:62px;
            filter:drop-shadow(0 0 18px #0f0);
        }
        
        .header-title {
            font-size:42px;
            letter-spacing:6px;
            color:#ff00ff;
            text-shadow:0 0 20px #f0f;
        }
        
        .rec-indicator {
            display:flex;
            align-items:center;
            gap:12px;
            font-size:32px;
            color:#ff0000;
            animation:recblink 800ms infinite;
            text-shadow:0 0 25px #f00;
        }
        
        @keyframes recblink { 50% { opacity:0.25; } }
        
        .controls {
            display:flex;
            gap:12px;
            align-items:center;
        }
        
        select, input[type="text"], button {
            background:#111;
            border:2px solid #00ff41;
            color:#00ff41;
            padding:8px 18px;
            font-family:'VT323', monospace;
            font-size:22px;
        }
        
        button:hover {
            background:#00ff41;
            color:#000;
        }
        
        .main-content {
            flex:1;
            display:flex;
            overflow:hidden;
        }
        
        .sidebar {
            width:320px;
            background:#050505;
            border-right:3px solid #00ff41;
            padding:25px 18px;
            overflow-y:auto;
        }
        
        .sidebar h3 {
            color:#ff00ff;
            margin-bottom:15px;
            text-shadow:0 0 10px #f0f;
        }
        
        .group-btn {
            width:100%;
            padding:16px 20px;
            margin-bottom:8px;
            background:#111;
            border:2px solid #00ff41;
            color:#00ff41;
            text-align:left;
            font-size:21px;
            cursor:pointer;
        }
        
        .group-btn.active, .group-btn:hover {
            background:#00ff41;
            color:#000;
        }
        
        .feed-grid {
            flex:1;
            padding:15px;
            overflow:auto;
            background:#000;
            display:grid;
            grid-template-columns:repeat(6, 1fr);
            gap:12px;
        }
        
        .camera-feed {
            position:relative;
            background:#111;
            border:3px solid #222;
            aspect-ratio:16/9;
            overflow:hidden;
            box-shadow:0 0 20px rgba(255,0,0,0.4);
            cursor:pointer;
            transition:all 0.2s;
        }
        
        .camera-feed:hover {
            border-color:#ff0000;
            box-shadow:0 0 45px #f00;
            transform:scale(1.03);
        }
        
        .camera-feed img {
            width:100%;
            height:100%;
            object-fit:cover;
        }
        
        .cam-overlay {
            position:absolute;
            inset:0;
            background:repeating-linear-gradient(transparent 0px, transparent 3px, rgba(0,255,65,0.12) 3px, rgba(0,255,65,0.12) 6px);
            animation:scan 3.8s linear infinite;
            pointer-events:none;
            z-index:2;
        }
        
        @keyframes scan {
            0% { background-position:0 0; }
            100% { background-position:0 600px; }
        }
        
        .cam-label {
            position:absolute;
            top:8px; left:8px;
            background:rgba(0,0,0,0.9);
            padding:4px 14px;
            font-size:17px;
            border:1px solid #0f0;
            z-index:5;
        }
        
        .live-badge {
            position:absolute;
            top:8px; right:8px;
            background:#ff0000;
            color:#fff;
            padding:4px 16px;
            font-size:17px;
            animation:livepulse 1.1s infinite;
            z-index:5;
        }
        
        @keyframes livepulse { 50% { background:#990000; } }
        
        .timestamp {
            position:absolute;
            bottom:8px; left:8px;
            background:rgba(0,0,0,0.9);
            padding:4px 12px;
            font-size:16px;
            z-index:5;
        }
        
        .static-overlay {
            position:absolute;
            inset:0;
            background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4"/></filter><rect width="200" height="200" filter="url(%23n)" opacity="0.25"/></svg>') repeat;
            opacity:0;
            z-index:3;
            pointer-events:none;
        }
        
        .footer {
            height:38px;
            background:#000;
            border-top:2px solid #00ff41;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 30px;
            font-size:19px;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN with your latest logo -->

            <img id="loginLogo" src="https://i.postimg.cc/hh4YHS5L/SHADOWBYTE-v4.png"

        <div class="hash-prompt">ENTER HASH KEY FOR ROOT ACCESS</div>

    <!-- MAIN INTERFACE -->
    <div id="mainInterface">
        <div class="header">
            <div class="logo-header">
                <img id="headerLogo" src="https://i.postimg.cc/hh4YHS5L/SHADOWBYTE-v4.png" 
                     onerror="this.src='https://i.postimg.cc/4nJCsvmp/SHADOWBYTE-v4.png';"

                <div style="margin-top:40px; font-size:18px;">

                    MOTION ALERTS: <span id="motionCount" style="color:#ff0000;">47</span>

            </div>
            
            <div id="feedGrid" class="feed-grid">

        </div>
        
        <div class="footer">

        </div>
    </div>

    <script>

            "http://66.27.116.187:80", "http://174.141.163.166:8080", "http://216.107.197.101:8086",
            "http://45.21.253.117:8000", "http://217.180.234.228:80", "http://184.177.43.105:80",
            "http://107.12.0.236:8082", "http://73.111.173.193:80", "http://128.146.135.226:80",
            "http://65.76.100.63:85", "http://162.191.81.11:81", "http://162.191.11.144:8000",
            "http://173.164.213.201:8083", "http://216.99.126.110:80", "http://166.141.93.41:8081",
            "http://71.249.87.61:80", "http://166.144.239.128:81", "http://23.114.74.201:8001",

            "http://98.147.54.22:8001", "http://66.215.136.18:8001", "http://142.105.253.172:50000",
            "http://67.61.139.162:8080", "http://209.124.145.124:84", "http://99.159.106.81:80",
            "http://66.103.160.160:80", "http://172.9.94.250:5000", "http://75.146.47.251:80",
            "http://199.104.253.4:80", "http://96.56.77.226:1024", "http://173.13.122.229:2000",
            "http://207.177.51.214:80", "http://142.54.98.170:1024", "http://206.71.252.171:80",
            "http://47.23.169.2:1024", "http://24.187.234.51:1024", "http://108.48.124.102:80",
            "http://68.195.211.106:1024", "http://47.23.137.138:1024", "http://50.122.133.122:3000",

            "http://148.61.134.229:80", "http://150.131.206.15:80", "http://206.158.6.24:80",

            "http://162.17.65.122:80", "http://173.163.225.58:83", "http://199.104.253.5:80",
            "http://206.230.61.85:8080", "http://75.148.116.206:80", "http://50.244.219.100:80"
            // ADD EVERY REMAINING URL FROM YOUR ORIGINAL LIST HERE
        ];

        let currentGroup = 'all';
        let columns = 6;

        const groups = {
            all: allCameras,
            uni: allCameras.slice(0, 60),
            high: allCameras.slice(60, 120),
            gov: allCameras.slice(120, 180),
            traffic: allCameras.slice(180, 240),
            private: allCameras.slice(240, 300),
            dark: allCameras.slice(0, 80),
            fail: allCameras.slice(300)
        };

        function createCameraFeed(url, index) {
            const feed = document.createElement('div');
            feed.className = 'camera-feed';
            feed.innerHTML = `
                <img src="${url}" onerror="this.parentElement.querySelector('.static-overlay').style.opacity='1'; this.style.display='none';">
                <div class="cam-label">CAM-${(index+1).toString().padStart(3,'0')}</div>
                <div class="live-badge">LIVE</div>
                <div class="timestamp" id="ts-${index}"></div>
                <div class="cam-overlay"></div>
                <div class="static-overlay"></div>
                <div class="motion-alert" id="motion-${index}">MOTION DETECTED</div>
            `;
            
            // EXACTLY WHAT YOU ASKED FOR: CLICK = OPEN IN NEW CHROME TAB (RAW LIKE 127.0.0.1:555)
            feed.addEventListener('click', () => {
                window.open(url, '_blank');
            });
            
            setInterval(() => {
                const ts = feed.querySelector(`#ts-${index}`);
                if (ts) ts.textContent = new Date().toLocaleTimeString();
            }, 1000);
            
            setInterval(() => {
                if (Math.random() > 0.92) {
                    const alert = feed.querySelector(`#motion-${index}`);
                    alert.style.display = 'block';
                    setTimeout(() => alert.style.display = 'none', 1600);
                }
            }, 4200);
            
            return feed;
        }

        function renderGrid(cameraList) {
            const grid = document.getElementById('feedGrid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
            cameraList.forEach((url, i) => grid.appendChild(createCameraFeed(url, i)));
        }

        function switchGroup(groupKey) {
            currentGroup = groupKey;
            document.querySelectorAll('.group-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${groupKey}'`)));
            renderGrid(groups[groupKey] || allCameras);
        }

        function updateTime() {
            document.getElementById('currentTime').textContent = new Date().toLocaleString();
        }

        function checkHash() {
            const input = document.getElementById('hashInput').value.trim();
            const error = document.getElementById('errorMsg');
            if (input === "mistakes@9") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainInterface').style.display = 'flex';
                renderGrid(allCameras);
                setInterval(updateTime, 1000);
            } else {
                error.textContent = "HASH REJECTED • ACCESS DENIED";
                setTimeout(() => error.textContent = '', 2200);
            }
        }

        document.getElementById('hashInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') checkHash();
        });

        document.getElementById('columnSelect').addEventListener('change', e => {
            columns = parseInt(e.target.value);
            renderGrid(groups[currentGroup] || allCameras);
        });

        document.getElementById('searchInput').addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            const filtered = allCameras.filter(url => url.toLowerCase().includes(term));
            renderGrid(filtered);
        });

        function recordAll() {
            alert("RECORDING ALL FEEDS TO DARKNET ARCHIVE...\n\nAll streams locked and saving.");
        }

        window.onload = () => {
            document.getElementById('hashInput').focus();
        };
    </script>
</body>
</html>
